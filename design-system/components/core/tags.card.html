<!-- @dsCard group="Components" viewport="700x210" name="Pills, Badges & Avatars" subtitle="Status tags and user marks across tones" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { padding: 22px; }
  #root { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3); width: 70px; flex: 0 0 70px; }
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Pill, Badge, Avatar } = window.TARSDesignSystem_9af650;
    function Demo() {
      return (
        <>
          <div className="row"><span className="lbl">Pills</span>
            <Pill tone="primary">Pre-approval</Pill>
            <Pill tone="buy" dot>Buyer</Pill>
            <Pill tone="sell" dot>Seller</Pill>
            <Pill tone="success" dot>Active</Pill>
            <Pill tone="warning">Pending</Pill>
            <Pill tone="ghost">Draft</Pill>
          </div>
          <div className="row"><span className="lbl">Badges</span>
            <Badge tone="success">Closed</Badge>
            <Badge tone="primary" dot>Stage 3 of 17</Badge>
            <Badge tone="danger">Overdue</Badge>
            <Badge tone="warning">Review</Badge>
          </div>
          <div className="row"><span className="lbl">Avatars</span>
            <Avatar name="Sarah Mitchell" tone="blue" />
            <Avatar name="Marcus Reed" tone="violet" />
            <Avatar name="Lisa Chen" tone="cyan" size={44} />
            <Avatar name="David Park" tone="slate" size={30} />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body></html>
