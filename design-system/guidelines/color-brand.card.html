<!-- @dsCard group="Colors" viewport="700x150" name="Brand roles" subtitle="Primary · Buy · Sell — the three TARS accents" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 18px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: 12px; box-shadow: var(--shadow-sm); }
  .nm { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--ink); }
  .role { font-size: 11px; color: var(--ink-3); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); margin-top: 1px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="nm">Primary</div><div class="role">Actions · links · brand</div><div class="hex">#2563EB</div></div>
    <div class="sw"><div class="chip" style="background:var(--buy)"></div><div class="nm">Buy</div><div class="role">Buyer journey</div><div class="hex">#8B5CF6</div></div>
    <div class="sw"><div class="chip" style="background:var(--sell)"></div><div class="nm">Sell</div><div class="role">Seller journey</div><div class="hex">#06B6D4</div></div>
  </div>
</body></html>
