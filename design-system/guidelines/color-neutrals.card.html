<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals" subtitle="Navy → slate ink ramp + surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 18px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 48px; border-radius: 8px; border: 1px solid var(--border); }
  .nm { margin-top: 6px; font-size: 10.5px; color: var(--ink-2); font-family: var(--font-mono); text-align: center; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--tars-navy-900)"></div><div class="nm">navy900</div></div>
    <div class="sw"><div class="chip" style="background:var(--tars-navy-700)"></div><div class="nm">navy700</div></div>
    <div class="sw"><div class="chip" style="background:var(--tars-slate-500)"></div><div class="nm">slate500</div></div>
    <div class="sw"><div class="chip" style="background:var(--tars-slate-300)"></div><div class="nm">slate300</div></div>
    <div class="sw"><div class="chip" style="background:var(--tars-slate-100)"></div><div class="nm">slate100</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="nm">bg</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="nm">surface</div></div>
  </div>
</body></html>
