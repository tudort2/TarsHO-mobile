<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Success · Warning · Danger" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 18px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: 12px; box-shadow: var(--shadow-sm); }
  .nm { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); margin-top: 1px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="nm">Success</div><div class="hex">#10B981</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="nm">Warning</div><div class="hex">#F59E0B</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="nm">Danger</div><div class="hex">#F43F5E</div></div>
  </div>
</body></html>
