<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 24px; display: flex; align-items: center; gap: 28px; background: var(--bg); }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 64px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .nm { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-2); }
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">shadow-sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow)"></div><div class="nm">shadow</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">shadow-lg</div></div>
</body></html>
