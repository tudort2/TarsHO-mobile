<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 / 8 base rhythm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; display: flex; align-items: flex-end; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--primary); border-radius: 4px; }
  .nm { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-2); }
</style></head>
<body>
  <div class="col"><div class="box" style="width:4px;height:4px"></div><div class="nm">xs·4</div></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><div class="nm">sm·8</div></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><div class="nm">md·16</div></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><div class="nm">lg·24</div></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><div class="nm">xl·32</div></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><div class="nm">xxl·48</div></div>
</body></html>
