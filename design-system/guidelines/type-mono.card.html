<!-- @dsCard group="Type" viewport="700x150" name="Mono / numerics" subtitle="IBM Plex Mono — tabular figures for money & data" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; display: flex; align-items: center; gap: 36px; }
  .big { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 30px; font-weight: 600; color: var(--ink); letter-spacing: -0.5px; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .k { font-family: var(--font-mono); font-size: 13px; color: var(--ink-2); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
</style></head>
<body>
  <div class="stack"><span class="meta">IBM Plex Mono 600 · tabular</span><span class="big">$1,284,500</span></div>
  <div class="stack">
    <span class="k">APR&nbsp;&nbsp;6.85%</span>
    <span class="k">LTV&nbsp;&nbsp;78.4%</span>
    <span class="k">DTI&nbsp;&nbsp;31.2%</span>
  </div>
</body></html>
